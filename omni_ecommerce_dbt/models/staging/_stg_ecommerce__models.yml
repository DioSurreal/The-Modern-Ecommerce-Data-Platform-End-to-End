version: 2

models:
  - name: stg_users
    description: "user data is cleaned"
    columns:
      - name: user_id
        description: "Primary key of users"
        tests:
          - unique
          - not_null
      - name: email
        description: "Email user"
        tests:
          - not_null

  - name: stg_orders
    description: "orders data"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_users')
                field: user_id

  - name: stg_order_items
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: item_status
        tests:
          - accepted_values:
              arguments:
                values: ['Shipped', 'Complete', 'Returned', 'Cancelled', 'Processing']

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: dc_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_distribution_centers')
                field: dc_id

  - name: stg_inventory_items
    columns:
      - name: inventory_item_id
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

  - name: stg_distribution_centers
    columns:
      - name: dc_id
        tests:
          - unique
          - not_null
